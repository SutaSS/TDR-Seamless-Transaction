name: Build & Push Docker Images — store.tdr-hpz.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tdr-hpz-app
  NGINX_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tdr-hpz-nginx

jobs:
  build-app:
    name: "🐳 Build & Push App (PHP-FPM)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=TDR HPZ App
            org.opencontainers.image.description=Laravel PHP-FPM — store.tdr-hpz.com

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_ENV=production
            WWWUSER=1000
            WWWGROUP=1000
          cache-from: type=registry,ref=${{ env.APP_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.APP_IMAGE }}:buildcache,mode=max
          provenance: false

  build-nginx:
    name: "🌐 Build & Push Nginx"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NGINX_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=TDR HPZ Nginx
            org.opencontainers.image.description=Nginx reverse proxy — store.tdr-hpz.com

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.NGINX_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.NGINX_IMAGE }}:buildcache,mode=max
          provenance: false

  notify:
    name: "📩 Telegram Notification"
    runs-on: ubuntu-latest
    needs: [build-app, build-nginx]
    if: always()

    steps:
      - name: Notify on success
        if: ${{ needs.build-app.result == 'success' && needs.build-nginx.result == 'success' }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TEXT="✅ *Build Successful*%0A%0A"
          TEXT+="*Repo:* ${{ github.repository }}%0A"
          TEXT+="*Commit:* \`${SHORT_SHA}\`%0A"
          TEXT+="*Author:* ${{ github.actor }}%0A"
          TEXT+="*Images ready:*%0A"
          TEXT+="  • \`${{ env.APP_IMAGE }}:latest\`%0A"
          TEXT+="  • \`${{ env.NGINX_IMAGE }}:latest\`%0A"
          TEXT+="*Time:* $(date '+%Y-%m-%d %H:%M %Z')"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=Markdown"

      - name: Notify on failure
        if: ${{ needs.build-app.result == 'failure' || needs.build-nginx.result == 'failure' }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TEXT="❌ *Build FAILED*%0A%0A"
          TEXT+="*Repo:* ${{ github.repository }}%0A"
          TEXT+="*Commit:* \`${SHORT_SHA}\`%0A"
          TEXT+="*Author:* ${{ github.actor }}%0A"
          TEXT+="*Logs:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=Markdown"
