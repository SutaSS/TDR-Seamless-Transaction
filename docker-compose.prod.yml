services:
  
  app:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
  
  worker:
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 192M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
  
  scheduler:
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 96M

  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  mysql:
    ports: [] 
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 448M
        reservations:
          cpus: "0.25"
          memory: 256M

  redis-cache:
    ports: []
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 112M

  redis-queue:
    ports: []
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 112M

  prometheus:
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  grafana:
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 192M
