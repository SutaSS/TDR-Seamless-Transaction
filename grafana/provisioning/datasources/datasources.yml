apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000

  - name: MySQL
    type: mysql
    url: mysql:3306
    database: "${DB_DATABASE}"
    user: "${DB_USERNAME}"
    secureJsonData:
      password: "${DB_PASSWORD}"
    editable: false
    jsonData:
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
